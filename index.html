<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inpurchase</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://unpkg.com/scrollreveal"></script>
<script src="https://js.paystack.co/v1/inline.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #0a0a0a;
  color: white;
  overflow-x: hidden;
}

/* NAVBAR */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 15px 30px;
  backdrop-filter: blur(15px);
  display: flex;
  justify-content: space-between;
  z-index: 999;
}

/* 3D INTRO */
#canvas {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: 1;
}

.overlay {
  position: relative;
  z-index: 2;
  text-align: center;
  top: 35%;
  opacity: 0;
  transition: 1.5s;
}

.enter-btn {
  padding: 14px 35px;
  border-radius: 30px;
  border: none;
  background: white;
  color: black;
  cursor: pointer;
}

/* STORE */
.store {
  display: none;
  padding: 80px 40px;
}

/* PRODUCTS */
.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 25px;
  margin-top: 40px;
}

.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  padding: 20px;
  border-radius: 20px;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px) scale(1.03);
}

.card img {
  width: 100%;
  border-radius: 10px;
}

.card button {
  margin-top: 10px;
  width: 100%;
  padding: 10px;
  border-radius: 20px;
  border: none;
  background: white;
  cursor: pointer;
}

/* CART */
.cart-panel {
  position: fixed;
  right: -100%;
  top: 0;
  width: 320px;
  height: 100%;
  background: #111;
  padding: 20px;
  transition: 0.5s;
  z-index: 1000;
}

.cart-panel.active {
  right: 0;
}
</style>
</head>

<body>

<div id="canvas"></div>

<div class="overlay" id="intro">
  <h1>Inpurchase</h1>
  <p>Premium Shopping Experience</p>
  <button class="enter-btn" onclick="enterStore()">Enter Store</button>
</div>

<div class="navbar">
  <h3>Inpurchase</h3>
  <div onclick="toggleCart()">🛒 (<span id="count">0</span>)</div>
</div>

<div class="store" id="store">
  <h2>Featured Products</h2>
  <div class="products"></div>
  <button onclick="payNow()">Checkout</button>
</div>

<div class="cart-panel" id="cartPanel">
  <h2>Your Cart</h2>
  <ul id="cartItems"></ul>
</div>

<script>
// 3D INTRO
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ alpha:true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.getElementById("canvas").appendChild(renderer.domElement);

camera.position.z = 5;

const geo = new THREE.TorusKnotGeometry(1,0.3,100,16);
const mat = new THREE.MeshStandardMaterial({color:0xffffff, wireframe:true});
const knot = new THREE.Mesh(geo, mat);
scene.add(knot);

const light = new THREE.PointLight(0xffffff,1);
light.position.set(5,5,5);
scene.add(light);

function animate(){
  requestAnimationFrame(animate);
  knot.rotation.x += 0.01;
  knot.rotation.y += 0.01;
  renderer.render(scene,camera);
}
animate();

setTimeout(()=>{document.getElementById("intro").style.opacity=1;},1500);

function enterStore(){
  document.getElementById("intro").style.display="none";
  document.getElementById("canvas").style.display="none";
  document.getElementById("store").style.display="block";
}

// SHOPIFY PRODUCTS
const DOMAIN = "your-store.myshopify.com";
const TOKEN = "your-storefront-access-token";

async function loadProducts(){
  const query = `
  {
    products(first:6){
      edges{
        node{
          title
          images(first:1){edges{node{url}}}
          variants(first:1){edges{node{price}}}
        }
      }
    }
  }`;

  const res = await fetch(`https://${DOMAIN}/api/2023-10/graphql.json`,{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "X-Shopify-Storefront-Access-Token":TOKEN
    },
    body:JSON.stringify({query})
  });

  const data = await res.json();
  const products = data.data.products.edges;

  const container = document.querySelector(".products");
  container.innerHTML="";

  products.forEach(p=>{
    let product = p.node;

    container.innerHTML += `
      <div class="card">
        <img src="${product.images.edges[0].node.url}">
        <h3>${product.title}</h3>
        <p>$${product.variants.edges[0].node.price}</p>
        <button onclick="addToCart('${product.title}', ${product.variants.edges[0].node.price})">Add</button>
      </div>
    `;
  });

  ScrollReveal().reveal('.card',{interval:200});
}

loadProducts();

// CART
let cart = [];

function addToCart(name, price){
  cart.push({name,price});
  document.getElementById("count").innerText = cart.length;

  let li = document.createElement("li");
  li.innerText = name + " - $" + price;
  document.getElementById("cartItems").appendChild(li);
}

function toggleCart(){
  document.getElementById("cartPanel").classList.toggle("active");
}

// PAYSTACK
function payNow(){
  let total = cart.reduce((sum,item)=>sum+parseFloat(item.price),0);

  let handler = PaystackPop.setup({
    key: 'YOUR_PAYSTACK_PUBLIC_KEY',
    email: 'customer@email.com',
    amount: total * 100,
    currency: "GHS",
    callback: function(){
      alert("Payment successful!");
    }
  });

  handler.openIframe();
}

// MOUSE 3D EFFECT
document.addEventListener("mousemove",(e)=>{
  let x = (e.clientX/window.innerWidth -0.5)*2;
  let y = (e.clientY/window.innerHeight -0.5)*2;

  document.querySelectorAll(".card").forEach(card=>{
    card.style.transform = `rotateY(${x*10}deg) rotateX(${y*10}deg)`;
  });
});
</script>

</body>
</html>
